site_name: Public Diplomacy Simulation Lab (PDSL)
site_description: Public, review-facing documentation for the Public Diplomacy Simulation Lab (PDSL).
site_author: Frantz Damas
site_url: https://damasconsultingservices-lang.github.io/pdsl-docs/

repo_name: PDSL Public Docs
repo_url: https://github.com/damasconsultingservices-lang/pdsl-docs
edit_uri: edit/main/docs/

docs_dir: docs
use_directory_urls: true

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.action.edit
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: navy
      accent: amber
    - scheme: slate
      primary: navy
      accent: amber
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: en/index.md
  - Methods:
      - Overview: en/methods/index.md
      - Model Card: en/methods/model-card.md
      - Methods Note: en/methods/methods-note.md
      - Review Protocol: en/methods/review-protocol.md
      - Governance: en/methods/governance.md
      - Limitations: en/methods/limitations.md
  - Policy:
      - Overview: en/policy/index.md
      - Policy Proposal: en/policy/policy-proposal.md
      - Policy Method Memo: en/policy/policy-method-memo.md
  - Cite:
      - How to Cite: en/cite/index.md
