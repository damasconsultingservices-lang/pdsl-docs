site_name: Public Diplomacy Simulation Lab (PDSL)
site_description: Public, review-facing documentation for the Public Diplomacy Simulation Lab (PDSL).
site_author: Frantz Damas
site_url: https://damasconsultingservices-lang.github.io/pdsl-docs/
repo_name: PDSL Public Docs
repo_url: https://github.com/damasconsultingservices-lang/pdsl-docs
edit_uri: edit/main/docs/
docs_dir: docs
use_directory_urls: true

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.action.edit
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: navy
      accent: amber
    - scheme: slate
      primary: navy
      accent: amber
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - i18n:
      default_language: en                 # Required for default/fallback in 1.x
      docs_structure: folder               # Subfolders: /en/, /fr/, /es/, /ht/
      fallback_to_default: true            # Show English if translation missing
      reconfigure_material: true           # Auto-adds language switcher in Material theme
      languages:
        en:
          name: English
          build: true
        fr:
          name: Français
          build: true
        es:
          name: Español
          build: true
        ht:
          name: Kreyòl Ayisyen
          build: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Methods:
      - Overview: methods/index.md
      - Model Card: methods/model-card.md
      - Methods Note: methods/methods-note.md
      - Review Protocol: methods/review-protocol.md
      - Governance: methods/governance.md
      - Limitations: methods/limitations.md
  - Policy:
      - Overview: policy/index.md
      - Policy Proposal: policy/policy-proposal.md
      - Policy Method Memo: policy/policy-method-memo.md
  - Cite:
      - How to Cite: cite/index.md
