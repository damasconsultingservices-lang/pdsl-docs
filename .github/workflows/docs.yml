name: Deploy docs
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: mkdocs-deploy
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies (requirements.txt)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Debug: Show exact installed versions
        run: |
          echo "Installed packages matching mkdocs / i18n:"
          pip list | grep -i -E 'mkdocs|material|i18n|static' || echo "No matches found"
          echo ""
          echo "Full freeze for i18n plugin:"
          pip freeze | grep -i static-i18n || echo "mkdocs-static-i18n not installed!"
      - name: Build (verbose)
        run: |
          mkdocs --version
          mkdocs build --clean --strict --verbose
      - name: Deploy to GitHub Pages (gh-pages)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mkdocs gh-deploy --force --clean
