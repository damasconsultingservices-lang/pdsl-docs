name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mkdocs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir --force-reinstall -r requirements.txt
          echo "----- VERSIONS (PROOF) -----"
          mkdocs --version
          python -m pip show mkdocs-static-i18n
          python -m pip freeze | grep -E "^(mkdocs|mkdocs-material|mkdocs-static-i18n)=="

      - name: Clean previous build directory
        run: rm -rf site

      - name: Build site
        run: |
          mkdocs build --clean --strict --verbose
          echo "----- TOP LEVEL SITE OUTPUT -----"
          ls -la site
          echo "----- LANGUAGE FOLDERS (IF ANY) -----"
          find site -maxdepth 2 -type d -print | sort | head -200
          echo "----- STYLESHEETS CHECK -----"
          ls -la site/assets/stylesheets || true

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mkdocs gh-deploy --clean --force --message "Deployed ${GITHUB_SHA} via GitHub Actions"
