name: Deploy docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mkdocs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies with forced i18n version
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Force-remove any old/broken i18n version first
          pip uninstall -y mkdocs-static-i18n || true
          # Install exact latest version that supports nav_translations & default_language
          pip install --no-cache-dir --force-reinstall mkdocs-static-i18n==1.3.1
          # Then install everything else from requirements.txt (if it exists)
          if [ -f requirements.txt ]; then
            pip install --no-cache-dir -r requirements.txt
          else
            echo "No requirements.txt found — installing minimal defaults"
            pip install --no-cache-dir mkdocs==1.6.1 mkdocs-material==9.5.48
          fi

      - name: Debug: Show exact installed versions
        run: |
          echo "Installed packages matching mkdocs / i18n / material:"
          pip list | grep -i -E 'mkdocs|material|i18n|static' || echo "No matches found"
          echo ""
          echo "Full pip freeze line for static-i18n:"
          pip freeze | grep -i static-i18n || echo "mkdocs-static-i18n not found!"

      - name: Build (verbose)
        run: |
          mkdocs --version
          mkdocs build --clean --strict --verbose

      - name: Deploy to GitHub Pages (gh-pages)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mkdocs gh-deploy --force --clean
